name: Build & Deploy Chronicle PWA

# One file in, deployed book out: committing an updated master/ (shell.html +
# content/*.html) rebuilds the PWA, runs the integrity checks, and deploys to
# GitHub Pages. The service worker version bumps automatically (content hash),
# so readers get the "new chapters" update toast on next launch.

on:
  push:
    branches: [main]
    paths:
      - 'master/**'
      - 'mapdata/**'
      - 'build/**'
      - 'tools/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let each push finish in order.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build site (includes integrity checks)
        run: node build/build.mjs

      - name: Validate the standalone fallback
        run: python3 tools/validate_codex.py site/chronicle-complete.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
